<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#040e0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Tidebreak — Invasol Games</title>
    <meta name="description" content="Defend the reef from the slime invasion! A bioluminescent tower defense game." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      /* Critical: prevents any flash of unstyled content and body scroll on mobile */
      *, *::before, *::after { box-sizing: border-box; }
      html {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: #040e0a;
        /* Prevent rubber-band overscroll on iOS */
        overscroll-behavior: none;
      }
      body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: #040e0a;
        overflow: hidden;
        /* Android Chrome: prevent address-bar bounce from showing white */
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      #root {
        /* position:fixed fills the visual viewport exactly, even when the
           browser address bar is visible or animating — fixes landscape cut-off */
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #040e0a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
